name: Update LeetCode Activity

on:
  schedule:
    - cron: "0 2 * * *"  # runs once a day at 2am UTC (~7am PKT)
  workflow_dispatch:      # lets you trigger it manually to test

jobs:
  update:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch LeetCode activity and update README
        run: python update_leetcode.py

      - name: Commit and push if README changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update recent LeetCode solves"
          git push
